project:
  name: football-prediction
  version: 0.1.0

# Scrapping configuration
# Format : "YYYY-YYYY"
seasons:
  - "2017-2018"
  - "2018-2019"
  - "2019-2020"
  - "2020-2021"
  - "2021-2022"
  - "2022-2023"
  - "2023-2024"
  - "2024-2025"

# Types de stats FBref à scraper
stat_types:
  - "schedule"
  - "shooting"
  - "keeper"
  - "misc"

# Ligues à scraper — commenter pour exclure
leagues:
  - "Premier League"
  - "Ligue 1"
  - "Bundesliga"
  - "Serie A"
  - "La Liga"
  - "Championship"
  - "Ligue 2"
  - "2. Bundesliga"
  - "Serie B"
  - "La Liga 2"

#  Path configuration
paths:
  raw_data: data/raw/
  processed: data/processed/
  features: data/features/
  models: models/
  db: db/football.duckdb
  duckdb: db/football.duckdb

# Compétitions
competitions:
- ligue_1
- premier_league
- liga
- bundesliga
- serie_a

# Pipeline configuration
pipeline:
  cron: "0 12 * * 1"          # lundi à 12h
  deployment_name: "pipeline-lundi-midi"
  retries: 2
  retry_delay_seconds: 30

# ── Agent Gemini ──────────────────────────────────────────────────────────────
agent:
  model: "gemini-3.1-flash-lite-preview"   # ou gemini-1.5-flash selon ta clé
  model_fallback: "gemini-2.0-flash-lite"
  max_turns: 10                # sécurité anti-boucle infinie
  verbose: true                # affiche le raisonnement intermédiaire
  log_file: "logs/agent.log"
  prefect_api: "http://127.0.0.1:4200/api"   # ← ligne 129 du code
  tools_defaults:
    read_logs_n_lines: 100
    get_pipeline_status_n_runs: 10
    read_backtest_n_recent: 100

# Modèle configuration
prediction:
  target: result_1n2
  classes:
  - H
  - D
  - A
  upset_confidence_threshold: 0.55   # seuil P(Away) pour valider un upset
  draw_threshold: 0.28
  value_edge: 0.05

features:
  form_window: 5           # référence inchangée
  form_windows: [3, 5, 10] # nouvelle clé P1
  h2h_window: 10

model:
  default: lightgbm
  test_size: 0.2
  random_state: 42
  cv_folds: 5

mlflow:
  experiment_name: football_1n2
  # Local
  # tracking_uri: mlruns/
  # Remote
  tracking_uri: https://dagshub.com/marcellin.stephane/Football_predictor.mlflow

train:
  use_autoencoder: false
  use_stacking: false
  test_season: 2024-2025
  TRAIN_SEASONS : [
    "2017-2018",
    "2018-2019", 
    "2019-2020",
    "2020-2021", 
    "2021-2022",
  ]
  VAL_SEASONS : ["2022-2023", "2023-2024"]   # deux saisons pour plus de robustesse
  TEST_SEASON : "2024-2025"
  val_split_pct: 0.5
  bottleneck_dim: 32
  bayes_n_iter: 50
  target: result_1n2

backtest:
  BANKROLL_INIT  : 1000.0   # bankroll initiale en unités
  EDGE_MIN       : 0.04     # edge minimum pour parier (prob_model - prob_implied)
  CONFIDENCE_MIN : 0.45     # confiance minimum du modèle
  KELLY_FRACTION : 0.5      # Half Kelly
  MAX_MISE_PCT   : 0.05     # mise max = 5% de la bankroll (protection)
  MIN_MISE       : 1.0      # mise minimale en unités
  BACKTEST_SEASONS_DEFAULT : ["2023-2024", "2024-2025"]

season_format: YYYY-YYYY

venue_mapping:
  Home: Home
  Away: Away
  home: Home
  away: Away
  H: Home
  A: Away
