                    severity: warn
              - is_valid_odds:
                  config:
                    severity: warn
          - name: odds_avg_d
            description: "Cote moyenne du marché match nul"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_valid_odds:
                  config:
                    severity: warn
          - name: odds_avg_a
            description: "Cote moyenne du marché victoire extérieur"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_valid_odds:
                  config:
                    severity: warn
          - name: odds_max_h
            description: "Meilleure cote disponible sur le marché victoire domicile"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_valid_odds:
                  config:
                    severity: warn
          - name: odds_max_d
            description: "Meilleure cote disponible match nul"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_valid_odds:
                  config:
                    severity: warn
          - name: odds_max_a
            description: "Meilleure cote disponible victoire extérieur"
