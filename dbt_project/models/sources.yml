version: 2

sources:
  - name: silver
    description: >
      Tables produites par 02_process.py après normalisation Python complète.
      Non gérées par dbt — dbt les lit uniquement.
    schema: silver

    tables:

      - name: fbref_schedule
        description: "Table centrale FBref — 1 ligne par équipe par match. Point de départ de toute la chaîne features."
        columns:
          - name: date
            description: "Date du match"
            tests:
              - not_null
          - name: time
            description: "Heure du match"
          - name: league_source
            description: "Nom de la compétition source (ex: Premier League, Ligue 1)"
            tests:
              - not_null
          - name: day
            description: "Jour de la semaine"
          - name: venue
            description: "Lieu du match du point de vue de l'équipe : Home ou Away"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Home', 'Away', 'Neutral']
          - name: result
            description: "Résultat brut FBref : W (victoire), D (nul), L (défaite)"
            tests:
              - accepted_values:
                  arguments:
                    values: ['W', 'D', 'L']
                  config:
                    severity: warn
          - name: gf
            description: "Buts marqués par l'équipe"
            tests:
              - not_null
              - is_positive
          - name: ga
            description: "Buts encaissés par l'équipe"
            tests:
              - not_null
              - is_positive
          - name: opponent
            description: "Nom normalisé de l'adversaire"
            tests:
              - not_null
          - name: poss
            description: "Possession en pourcentage (VARCHAR — castée en DOUBLE dans gold)"
          - name: formation
            description: "Formation tactique de l'équipe (ex: 4-3-3)"
          - name: opp_formation
            description: "Formation tactique de l'adversaire"
          - name: team
            description: "Nom normalisé de l'équipe"
            tests:
              - not_null
          - name: season
            description: "Saison au format YYYY-YYYY"
            tests:
              - not_null
          - name: source
            description: "Source de la donnée (fbref)"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['fbref']
          - name: scraped_at
            description: "Timestamp du scraping"
          - name: comp_category
            description: "Catégorie de compétition : Big5, Cup, Europe"
            tests:
              - not_null
          - name: raw_team
            description: "Nom brut de l'équipe avant normalisation"
            tests:
              - not_null
          - name: raw_opponent
            description: "Nom brut de l'adversaire avant normalisation"
            tests:
              - not_null

          - name: result_1n2
            description: "Résultat encodé du point de vue de l'équipe : H (victoire domicile), D (nul), A (victoire extérieur)"
            tests:
              - accepted_values:
                  arguments:
                    values: ['H', 'D', 'A']

