          - name: match_id
            description: "Identifiant unique Understat du match — clé de jointure avec understat_stats"
            tests:
              - not_null
              - unique
          - name: league_source
            description: "Nom de la compétition source"
            tests:
              - not_null
          - name: home_team
            description: "Nom normalisé de l'équipe domicile"
            tests:
              - not_null
          - name: away_team
            description: "Nom normalisé de l'équipe extérieur"
            tests:
              - not_null
          - name: home_goals
            description: "Buts marqués par l'équipe domicile"
            tests:
              - is_positive
          - name: away_goals
            description: "Buts marqués par l'équipe extérieur"
            tests:
              - is_positive
          - name: home_xg
            description: "Expected goals équipe domicile"
            tests:
              - is_positive
          - name: away_xg
            description: "Expected goals équipe extérieur"
            tests:
              - is_positive
          - name: is_result
            description: "Indique si le match a un résultat définitif (1) ou est à venir (0)"
