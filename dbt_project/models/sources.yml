      - name: understat_stats
        description: "Statistiques xG détaillées par match (Understat) — 1 ligne par match. Jointure avec understat_schedule sur match_id."
        columns:
          - name: match_id
            description: "Identifiant Understat du match — clé de jointure avec understat_schedule"
            tests:
              - not_null
              - unique
          - name: home_xpts
            description: "Expected points domicile — points attendus selon les xG du match"
            tests:
              - not_null
              - is_positive
          - name: away_xpts
            description: "Expected points extérieur"
            tests:
              - not_null
              - is_positive
          - name: home_np_xg
            description: "Expected goals sans pénalties — équipe domicile"
            tests:
              - not_null
              - is_positive
          - name: away_np_xg
            description: "Expected goals sans pénalties — équipe extérieur"
            tests:
              - not_null
              - is_positive
          - name: home_np_xg_diff
            description: "Différentiel npxG domicile (home_np_xg - away_np_xg)"
            tests:
              - not_null
          - name: away_np_xg_diff
            description: "Différentiel npxG extérieur (away_np_xg - home_np_xg)"
            tests:
              - not_null
          - name: home_ppda
            description: "PPDA domicile — passes adverses autorisées par action défensive (mesure l'intensité du pressing)"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_positive
          - name: away_ppda
            description: "PPDA extérieur"
            tests:
              - not_null:
                  config:
                    severity: warn
              - is_positive
          - name: home_deep
            description: "Passes complétées dans les 18 derniers mètres adverses — domicile (mesure la pression offensive)"
            tests:
              - not_null
              - is_positive
          - name: away_deep
            description: "Passes complétées dans les 18 derniers mètres adverses — extérieur"
