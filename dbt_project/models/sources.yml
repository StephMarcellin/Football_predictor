          - name: team
            description: "Nom normalisé de l'équipe"
            tests:
              - not_null
          - name: season
            description: "Saison au format YYYY-YYYY"
            tests:
              - not_null
          - name: source
            description: "Source de la donnée (fbref)"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['fbref']
          - name: scraped_at
            description: "Timestamp du scraping"
          - name: comp_category
            description: "Catégorie de compétition : Big5, Cup, Europe"
            tests:
              - not_null
          - name: raw_team
            description: "Nom brut de l'équipe avant normalisation"
            tests:
              - not_null
          - name: raw_opponent
            description: "Nom brut de l'adversaire"
            tests:
              - not_null
          - name: result_1n2
            description: "Résultat encodé : H, D, A"
            tests:
              - accepted_values:
                  arguments:
                    values: ['H', 'D', 'A']

