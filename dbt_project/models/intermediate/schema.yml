version: 2

models:
  - name: backbone
    description: >
      Table pivot centrale — 1 ligne par équipe par match.
      Jointure de 7 tables silver.* produite par dbt en mode incremental.
      Schéma intermediate — consommée par les modèles gold.features_*.
    config:
      alias: backbone

    columns:

      # ── Identifiants ────────────────────────────────────────────────────────
      - name: match_id
        description: "Identifiant Understat du match — NULL si le match n'existe pas dans Understat"
        tests:
          - not_null:
              config:
                severity: warn
      - name: date
        description: "Date du match"
        tests:
          - not_null

      - name: team_id
        description: "Nom normalisé de l'équipe"
        tests:
          - not_null

      - name: opponent_id
        description: "Nom normalisé de l'adversaire"
        tests:
          - not_null

      - name: venue
        description: "Lieu du match du point de vue de l'équipe : Home ou Away"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Home', 'Away', 'Neutral']

      - name: season
        description: "Saison au format YYYY-YYYY"
        tests:
          - not_null

      - name: league_source
        description: "Nom de la compétition source (ex: Premier League, Ligue 1)"
        tests:
          - not_null

      - name: comp_category
        description: "Catégorie de compétition : Big5, Cup, Europe"
        tests:
          - not_null

      - name: result_1n2
        description: "Résultat du point de vue de l'équipe : H (victoire), D (nul), A (défaite)"
        tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              config:
                severity: error
              arguments:
                values: ['H', 'D', 'A']

      - name: formation
        description: "Formation tactique de l'équipe (ex: 4-3-3)"

      # ── Résultats bruts ──────────────────────────────────────────────────────
      - name: gf
        description: "Buts marqués par l'équipe"
        tests:
          - not_null
          - is_positive

      - name: ga
        description: "Buts encaissés par l'équipe"
        tests:
          - not_null
          - is_positive

      - name: possession
        description: "Possession en pourcentage (castée depuis VARCHAR fbref_schedule)"
        tests:
          - is_positive

      # ── Gardien (fbref_keeper) ───────────────────────────────────────────────
      - name: shots_on_target_faced
        description: "Tirs cadrés subis par le gardien (sota)"
        tests:
          - is_positive

      - name: saves
        description: "Arrêts du gardien"
        tests:
          - is_positive

      - name: save_pct
        description: "Pourcentage d'arrêts (saves / shots_on_target_faced)"

      - name: clean_sheet
        description: "1 si aucun but encaissé, 0 sinon"
        tests:
          - is_positive

      # ── Tirs (fbref_shooting) ────────────────────────────────────────────────
      - name: shots_total
        description: "Total de tirs tentés"
        tests:
          - is_positive

      - name: shots_on_target
        description: "Tirs cadrés"
        tests:
          - is_positive

      - name: goals_per_shot
        description: "Buts par tir (efficacité offensive brute)"

      # ── Disciplinaire (fbref_misc) ───────────────────────────────────────────
      - name: yellow_cards
        description: "Cartons jaunes reçus"
        tests:
          - is_positive

      - name: second_yellow_cards
        description: "Deuxièmes cartons jaunes (expulsion indirecte)"
        tests:
          - is_positive

      - name: red_cards
        description: "Cartons rouges directs reçus"
        tests:
          - is_positive

      - name: fouls_committed
        description: "Fautes commises"
        tests:
          - is_positive

      - name: interceptions
        description: "Interceptions"
        tests:
          - is_positive

      - name: tackles_won
        description: "Tacles remportés"
        tests:
          - is_positive

      # ── xG et pressing (understat_stats) ────────────────────────────────────
      - name: np_xg
        description: "Expected goals sans pénalties du point de vue de l'équipe (Understat) — NULL si match hors Understat"
        tests:
          - is_positive

      - name: np_xg_conceded
        description: "Expected goals sans pénalties concédés — NULL si match hors Understat"
        tests:
          - is_positive

      - name: ppda
        description: "PPDA de l'équipe — passes adverses autorisées par action défensive (mesure le pressing)"
        tests:
          - is_positive

      - name: ppda_allowed
        description: "PPDA autorisé à l'adversaire — pressing subi"
        tests:
          - is_positive

      - name: np_xg_diff_match
        description: "Différentiel npxG du match (np_xg - np_xg_conceded) — peut être négatif"

      # ── WhoScored saison (whoscored_team_season) ─────────────────────────────
      - name: season_att_rating
        description: "Rating offensif WhoScored de la saison selon le venue (Home ou Away)"
        tests:
          - is_positive

      - name: season_def_rating
        description: "Rating défensif WhoScored de la saison selon le venue"
        tests:
          - is_positive

      - name: ws_dribbles_pg
        description: "Dribbles réussis par match selon le venue"
        tests:
          - is_positive

      - name: ws_fouled_pg
        description: "Fautes subies par match selon le venue"
        tests:
          - is_positive

      - name: ws_shots_ot_pg
        description: "Tirs cadrés par match selon le venue"
        tests:
          - is_positive

      # ── Cotes Pinnacle (odds) ────────────────────────────────────────────────
      - name: odds_pinnacle_team
        description: "Cote Pinnacle victoire de l'équipe (H si Home, A si Away)"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      - name: odds_pinnacle_draw
        description: "Cote Pinnacle match nul"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      - name: odds_pinnacle_opp
        description: "Cote Pinnacle victoire de l'adversaire"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      - name: odds_avg_team
        description: "Cote moyenne marché victoire de l'équipe"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      - name: odds_avg_draw
        description: "Cote moyenne marché match nul"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      - name: odds_avg_opp
        description: "Cote moyenne marché victoire adversaire"
        tests:
          - is_valid_odds:
              config:
                severity: warn

      # ── Probabilités implicites ──────────────────────────────────────────────
      - name: pinnacle_prob_team
        description: "Probabilité implicite Pinnacle victoire de l'équipe"
        tests:
          - is_valid_probability:
              config:
                severity: warn

      - name: pinnacle_prob_draw
        description: "Probabilité implicite Pinnacle match nul"
        tests:
          - is_valid_probability:
              config:
                severity: warn

      - name: pinnacle_prob_opp
        description: "Probabilité implicite Pinnacle victoire adversaire"
        tests:
          - is_valid_probability:
              config:
                severity: warn

      - name: market_prob_team
        description: "Probabilité implicite marché moyen victoire de l'équipe"
        tests:
          - is_valid_probability:
              config:
                severity: warn

      - name: market_prob_draw
        description: "Probabilité implicite marché moyen match nul"
        tests:
          - is_valid_probability:
              config:
                severity: warn

      - name: market_prob_opp
        description: "Probabilité implicite marché moyen victoire adversaire"
        tests:
          - is_valid_probability:
              config:
                severity: warn

  - name: events_qual
    description: >
      Explosion des qualifiers JSON de stg_whoscored_events.
      1 ligne par action par qualifier — base de tous les modèles WhoScored.
      Produit par dbt en mode incremental depuis silver.stg_whoscored_events.

    columns:
      - name: ws_match_id
        description: "Identifiant WhoScored du match"
        tests:
          - not_null

      - name: team_id
        description: "Identifiant WhoScored de l'équipe"
        tests:
          - not_null

      - name: player_id
        description: "Identifiant WhoScored du joueur (NULL si anonyme)"

      - name: row_num
        description: "Numéro de ligne de l'action dans le match"
        tests:
          - not_null

      - name: qual_type_id
        description: "Identifiant du qualifier (ex: 210 = key pass)"

      - name: qual_type_name
        description: "Nom lisible du qualifier"

      - name: qual_value
        description: "Valeur du qualifier"

      - name: type_id
        description: "Type d'action WhoScored (16=tir, 1=passe...)"
        tests:
          - not_null

      - name: is_shot
        description: "Booléen — l'action est-elle un tir ?"

      - name: x
        description: "Coordonnée X de l'action sur le terrain (0-100)"

      - name: y
        description: "Coordonnée Y de l'action sur le terrain (0-100)"

      - name: minute
        description: "Minute de l'action"
        tests:
          - not_null
      - name: event_id
        description: "Identifiant de l'action dans le match"
        tests:
          - not_null

  - name: player_match_stats
    description: >
      Agrégats WhoScored par joueur par match.
      Calculé depuis int_whoscored_events et events_qual.
      Structure en trois CTEs : base_agg (métriques générales),
      offensive_agg (passes, tirs, progressions),
      defensive_agg (tackles, interceptions, dégagements).
      Utilisé pour les squad features dans gold.features_whoscored.

    columns:
      - name: match_id
        description: "Identifiant du match (SHA1)"
        tests:
          - not_null
      - name: team_id
        description: "Identifiant WhoScored de l'équipe"
        tests:
          - not_null
      - name: player_id
        description: "Identifiant WhoScored du joueur"
        tests:
          - not_null
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: season
        description: "Saison (format YYYY-YYYY)"
        tests:
          - not_null
      - name: league_source
        description: "Ligue source"
        tests:
          - not_null

      # ── Métriques générales ──────────────────────────────────────
      - name: n_actions
        description: "Nombre total d'actions du joueur dans le match"
        tests:
          - is_positive
      - name: xg_contribution
        description: >
          Contribution xG estimée — nombre de tirs pondéré par la distance
          géométrique au centre du but adverse.
        tests:
          - is_positive
      - name: zone_dominance
        description: >
          Position moyenne X des touches (hors actions gardien).
          0 = zone défensive, 100 = zone offensive.

      # ── Métriques offensives ─────────────────────────────────────
      - name: n_shots
        description: "Nombre de tirs tentés"
        tests:
          - is_positive
      - name: n_shots_regular_play
        description: "Tirs dans le jeu collectif (qualifier RegularPlay=22)"
        tests:
          - is_positive
      - name: n_shots_individual_play
        description: "Tirs après action individuelle (qualifier IndividualPlay=215)"
        tests:
          - is_positive
      - name: n_shot_assists
        description: "Passes directement avant un tir (qualifier ShotAssist=210)"
        tests:
          - is_positive
      - name: n_key_passes
        description: "Passes clés WhoScored (qualifier KeyPass=11113)"
        tests:
          - is_positive
      - name: n_longballs
        description: "Longues passes (qualifier Longball=1, type Pass)"
        tests:
          - is_positive
      - name: n_crosses
        description: "Centres (qualifier Cross=2, type Pass)"
        tests:
          - is_positive
      - name: n_throughballs
        description: "Passes en profondeur (qualifier Throughball=4, type Pass)"
        tests:
          - is_positive
      - name: n_progressive_passes
        description: >
          Passes réussies faisant avancer le ballon de 10+ unités
          vers le but adverse (end_x > x + 10).
        tests:
          - is_positive

      # ── Métriques défensives ─────────────────────────────────────
      - name: n_tackles
        description: "Nombre de tacles tentés (type_id=7)"
        tests:
          - is_positive
      - name: n_tackles_won
        description: "Nombre de tacles réussis (type_id=7, outcome_id=1)"
        tests:
          - is_positive
      - name: n_interceptions
        description: "Nombre d'interceptions (type_id=8)"
        tests:
          - is_positive
      - name: n_ball_recoveries
        description: "Récupérations de balle libre (type_id=49)"
        tests:
          - is_positive
      - name: n_challenges
        description: >
          Challenges offensifs (type_id=45, toujours Unsuccessful).
          Signal de pressing et de résistance au tackle.
        tests:
          - is_positive
      - name: n_clearances
        description: "Dégagements défensifs (type_id=12)"
        tests:
          - is_positive
      - name: defensive_zone_x
        description: >
          Position X moyenne des actions défensives
          (tackles, interceptions, récupérations, challenges, dégagements).
          Mesure la hauteur de la ligne défensive du joueur.
          Valeur basse = défend profond, valeur haute = pressing haut.

      # ── Discipline ───────────────────────────────────────────────
      - name: n_yellow_cards
        description: "Cartons jaunes reçus par le joueur (event type 17, card_type=Yellow)"
        tests:
          - is_positive
      - name: n_second_yellows
        description: "Deuxièmes cartons jaunes (expulsion indirecte, card_type=SecondYellow)"
        tests:
          - is_positive
      - name: n_red_cards
        description: "Cartons rouges directs reçus (card_type=Red)"
        tests:
          - is_positive

      # ── Création (lien direct related_player_id) ─────────────────
      - name: n_assists
        description: >
          Passes décisives — buts où le joueur est le créateur direct
          (related_player_id). Conservateur vs qualifier 11111, mais lien exact.
        tests:
          - is_positive
      - name: n_chances_created
        description: "Tirs créés par le joueur (related_player_id sur un tir, toutes issues)"
        tests:
          - is_positive

      # ── Duels aériens offensifs / défensifs ──────────────────────
      - name: n_aerial_offensive
        description: "Duels aériens offensifs (type 44 + qualifier 286)"
        tests:
          - is_positive
      - name: n_aerial_defensive
        description: "Duels aériens défensifs (type 44 + qualifier 285)"
        tests:
          - is_positive

  - name: team_features_ws
    description: >
      Features tactiques WhoScored par équipe par match.
      Calculées depuis silver.stg_whoscored_events et intermediate.events_qual.
      32 métriques couvrant le pressing, les zones d'attaque, la structure défensive.
    columns:
      - name: ws_match_id
        description: "Identifiant WhoScored du match"
        tests:
          - not_null
      - name: team_id
        description: "Identifiant WhoScored de l'équipe"
        tests:
          - not_null
      - name: ws_field_tilt_actions
        description: "Tilt de terrain — proportion de touches en zone offensive"
      - name: ws_momentum_delta
        description: "Delta de momentum après avoir encaissé un but (actions post / actions pre)"
      - name: ws_zone_att_pct
        description: "Pourcentage de touches en zone offensive (x > 66.6)"
      - name: ws_counter_attack_dna
        description: "ADN contre-attaque — proportion de tirs issus d'une récupération < 15 secondes"
      - name: ws_midfield_control_idx
        description: "Contrôle du milieu — part des actions réussies en zone centrale"
      - name: ws_defensive_line_height
        description: "Hauteur moyenne de la ligne défensive (position X)"
      - name: ws_flank_exposure_asymm
        description: "Asymétrie d'exposition sur les flancs — différentiel gauche/droite"

  - name: h2h_history
    description: "Registre brut des confrontations directes entre équipes. Une ligne par match."
    columns:
      - name: match_id
        tests:
          - not_null
      - name: home_team_id
        tests:
          - not_null
      - name: away_team_id
        tests:
          - not_null
      - name: date
        tests:
          - not_null
  - name: player_possession_chains
    description: >
      Segmente le flux d'événements WhoScored en chaînes de possession.
      Pour chaque événement, détermine l'équipe réellement en possession
      (possession certaine vs indéterminée), puis marque le déclencheur de
      chaque chaîne via chain_trigger (corner, free_kick, counter_attack,
      open_play, recovery, throw_in, goal_kick...).
      Source : int_event_enriched. Incrémentale sur match_id.
      Brique de base de corner_profiles, player_passes_raw et player_xg_chain.
      Une ligne par action.
    columns:
      - name: match_id
        tests:
          - not_null
      - name: row_num
        tests:
          - not_null
          - unique:
              config:
                severity: error
  - name: freekick_profiles
    description: >
      Profils de coups francs par chaîne. Caractérise chaque coup franc par
      son type (direct, indirect, short_pass) et son issue (goal, shot_saved,
      shot_off_target, offside, foul_won, corner_won, open_play, turnover).
      Source : player_possession_chains. Incrémentale.
    columns:
      - name: match_id
        tests:
          - not_null
      - name: row_num
        tests:
          - not_null
      - name: fk_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['direct', 'indirect', 'short_pass']
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['goal', 'shot_saved', 'shot_off_target', 'offside', 'foul_won', 'corner_won', 'open_play', 'turnover']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - row_num

  # ════════════════════════════════════════════════════════════════════════════
  # COUCHE int_* — rematchage silver → clés unifiées
  # Chaque table lit une source silver.*, remplace les noms d'équipes bruts par
  # team_id normalisé (team_mapping) et rattache le match_id unifié
  # (match_registry). Matérialisées en table.
  # ════════════════════════════════════════════════════════════════════════════

  - name: int_fbref_keeper
    description: >
      Stats gardien FBref (tirs cadrés subis, arrêts, save%) rematchées sur
      match_id unifié et team_id normalisé. Alimente les colonnes gardien
      de backbone.

  - name: int_fbref_misc
    description: >
      Stats disciplinaires et défensives FBref (cartons, fautes commises,
      interceptions, tacles gagnés) rematchées sur match_id + team_id.
      Alimente le bloc disciplinaire de backbone.

  - name: int_fbref_schedule
    description: >
      Feuille de match FBref (résultat, buts marqués/encaissés, possession,
      formation) rematchée sur match_id + team_id. Source des résultats bruts
      et de la possession dans backbone.

  - name: int_fbref_shooting
    description: >
      Volume de tirs FBref (tirs totaux, tirs cadrés, buts par tir) rematché
      sur match_id + team_id. Alimente le bloc tirs de backbone.

  - name: int_odds
    description: >
      Cotes bookmakers (Pinnacle et moyennes marché) rematchées sur match_id
      + team_id/opponent_id. Alimente les colonnes odds_* et les probabilités
      implicites de backbone.

  - name: int_understat_schedule
    description: >
      Calendrier Understat rematché sur le match_id unifié. Conserve
      us_match_id (id Understat d'origine) et produit la correspondance
      us_match_id ↔ match_id réutilisée par int_understat_stats.

  - name: int_understat_stats
    description: >
      Stats Understat par match (npxG, npxG concédés, PPDA) rattachées au
      match_id unifié via int_understat_schedule. Alimente les colonnes xG
      et pressing de backbone.

  - name: int_whoscored_match_index
    description: >
      Pont d'identité entre l'univers WhoScored (ws_match_id, ws_home/away_team_id)
      et les clés unifiées (match_id, team_id normalisé). Table de résolution
      d'identité centrale pour toute la chaîne événementielle WhoScored.

  - name: int_whoscored_events
    description: >
      Événements bruts WhoScored (silver.stg_whoscored_events) avec team_id
      normalisé et match_id unifié, résolus via int_whoscored_match_index.
      Point d'entrée de la chaîne événementielle.

  - name: int_whoscored_team_season
    description: >
      Ratings agrégés de saison WhoScored par équipe (attaque/défense, dribbles,
      tirs cadrés par match, différenciés Home/Away). Alimente les colonnes
      season_*/ws_* de backbone.

  # ════════════════════════════════════════════════════════════════════════════
  # CHAÎNE ÉVÉNEMENTIELLE — enrichissement et valorisation par action
  # ════════════════════════════════════════════════════════════════════════════

  - name: int_event_enriched
    description: >
      Événements WhoScored enrichis d'un pivot des qualifiers utiles, notamment
      la hiérarchie chance_creation (leading_to_goal, intentional_assist,
      big_chance_created, key_pass, shot_assist...). Table socle de event_values,
      player_possession_chains, player_network_duels et player_zone_transitions.
      Incrémentale sur scraped_at.

  - name: event_values
    description: >
      Valorise chaque événement individuel selon deux axes : danger_position
      (localisation terrain pondérée offensif/défensif) et chance_creation
      (proxy xG hiérarchisé). Couche "value par action" consommée par les
      modèles de chaînes. Source : int_event_enriched. Incrémentale.

  # ════════════════════════════════════════════════════════════════════════════
  # COUPS DE PIED ARRÊTÉS
  # ════════════════════════════════════════════════════════════════════════════

  - name: corner_profiles
    description: >
      Profils de corners. Pour chaque chaîne déclenchée par un corner,
      caractérise la livraison (end_x/end_y, joueur, via qualifier CornerTaken=6)
      et l'issue de la séquence. Source : player_possession_chains. Incrémentale.

  # ════════════════════════════════════════════════════════════════════════════
  # RÉSEAU DE PASSES JOUEUR
  # player_passes_raw → player_network_passes → centrality / betweenness / duels
  #                                          → team_network_features
  # ════════════════════════════════════════════════════════════════════════════

  - name: player_passes_raw
    description: >
      Passes atomiques passeur → receveur reconstruites depuis les chaînes de
      possession (LEAD sur les événements de l'équipe en possession, sans sauter
      les événements adverses). Porte les flags is_progressive/is_creative/
      is_buildup et le chain_trigger. Brique de base du réseau de passes.

  - name: player_network_passes
    description: >
      Arêtes du graphe de passes agrégées par (match, équipe, passeur, receveur) :
      volume total et ventilé par contexte (contre-attaque, open play, recovery,
      autre), passes progressives/créatives/buildup. Source : player_passes_raw.

  - name: player_network_centrality
    description: >
      Centralité de chaque joueur dans le réseau de passes : degrés entrant et
      sortant (bruts et pondérés par le volume), passes créatives/progressives
      émises et reçues. Source : player_network_passes.

  - name: player_network_betweenness
    description: >
      Modèle Python (dbt-python). Calcule la betweenness centrality exacte par
      (match, équipe) avec networkx sur le graphe pondéré de passes (normalized=True,
      weight=n_passes). Identifie les joueurs-ponts. Source : player_network_passes.

  - name: player_network_duels
    description: >
      Apparie les duels adverses via le qualifier 233 (miroir d'événement) pour
      relier le joueur A et son vis-à-vis B sur le même affrontement. Matière
      première des duels individuels. Sources : events_qual, int_event_enriched.

  - name: team_network_features
    description: >
      Agrège les métriques réseau joueur → features d'équipe par match : nombre
      de joueurs et d'arêtes actifs, dépendance au top créateur (top_creator_share),
      betweenness moyenne, entropie de Shannon du réseau (network_entropy).
      Source : player_network_centrality.

  # ════════════════════════════════════════════════════════════════════════════
  # xG / MENACE / ZONES
  # ════════════════════════════════════════════════════════════════════════════

  - name: player_xg_chain
    description: >
      Attribue une valeur xG (proxy via chance_creation du tir terminal) aux
      joueurs impliqués dans une chaîne se terminant par un tir — crédit offensif
      réparti sur la chaîne. Source : player_possession_chains. Incrémentale.

  - name: threat_conceded
    description: >
      Symétrique défensif de player_xg_chain : attribue la menace concédée sur
      les chaînes adverses terminées par un tir (penalty exclu), pour mesurer la
      responsabilité défensive. Source : player_xg_chain. Incrémentale.

  - name: player_zone_transitions
    description: >
      Compte les transitions de zone (zone_from → zone_to) par joueur, ventilées
      par période, état au score (score_state) et formation. Décrit les patterns
      de circulation du ballon. Source : int_event_enriched. Incrémentale.

  - name: int_whoscored_player_match
    description: >
      Stats + note WhoScored par joueur par match, identités normalisées.
      Traduit l'id d'équipe WhoScored vers le team_id canonique et rattache le
      match_id unifié via int_whoscored_match_index (même logique que
      int_whoscored_events). player_id reste l'id WhoScored (clé vers
      silver.stg_whoscored_players_ref). Source : silver.stg_whoscored_player_match.
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: team_id
        description: "Id canonique de l'équipe (converti depuis l'id WhoScored)"
      - name: player_id
        description: "Identifiant WhoScored du joueur (FK vers stg_whoscored_players_ref)"
        tests:
          - not_null
      - name: rating
        description: "Note WhoScored finale du joueur sur le match"
      - name: stats_json
        description: "Stats du joueur par minute (JSON brut) — totaux calculés plus tard"

  - name: int_whoscored_formations
    description: >
      Timeline tactique par équipe par match, identités normalisées (team_id
      canonique + match_id unifié via int_whoscored_match_index).
      formation_id reste la clé vers silver.stg_whoscored_formations_ref.
      Source : silver.stg_whoscored_formations.
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: team_id
        description: "Id canonique de l'équipe (converti depuis l'id WhoScored)"
      - name: formation_id
        description: "Identifiant de la formation (FK vers stg_whoscored_formations_ref)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id
            - formation_seq

  - name: int_whoscored_team_match
    description: >
      Stats d'équipe officielles WhoScored par match, identités normalisées.
      Conserve stats_json brut (35 métriques par minute) ; extraction des totaux
      plus tard. Source : silver.stg_whoscored_team_match.
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: team_id
        description: "Id canonique de l'équipe (converti depuis l'id WhoScored)"
      - name: stats_json
        description: "Stats équipe par minute (JSON brut) — totaux calculés plus tard"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id

  - name: int_whoscored_players
    description: >
      Dimension joueur par saison et par équipe — grain (player_id, season,
      team_id canonique). Un transfert en cours de saison = plusieurs lignes.
      Profil courant height/weight (âge exclu car WhoScored renvoie l'âge du
      scrape, pas du match). Sources : int_whoscored_player_match,
      int_whoscored_match_index, silver.stg_whoscored_players_ref.
    columns:
      - name: player_id
        description: "Identifiant WhoScored du joueur"
        tests:
          - not_null
      - name: season
        description: "Saison (rattachée via le match)"
      - name: team_id
        description: "Id canonique de l'équipe"
      - name: player_name
        description: "Nom du joueur (depuis la table de référence)"
      - name: n_matchs
        description: "Nombre de matchs joués pour cette équipe cette saison"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - player_id
            - season
            - team_id

  - name: int_whoscored_lineup
    description: >
      Composition positionnelle par période de formation — grain (match × équipe
      × formation_seq × joueur), une ligne par titulaire (slot 1..11). La position
      est récupérée via le slot du joueur (formation_positions[slot]), pas par
      alignement d'index : robuste aux trous de slot (carton rouge). Identités
      normalisées (team_id canonique + match_id unifié via int_whoscored_match_index).
      Source : silver.stg_whoscored_formations (prérequis : formation_slots rempli).
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: team_id
        description: "Id canonique de l'équipe (converti depuis l'id WhoScored)"
      - name: player_id
        description: "Identifiant WhoScored du joueur titulaire"
        tests:
          - not_null
      - name: slot
        description: "Slot de formation 1..11 (1 = gardien)"
      - name: grid_vertical
        description: "Coordonnée verticale sur la grille tactique (0 = ligne de but propre)"
      - name: grid_horizontal
        description: "Coordonnée horizontale sur la grille tactique (5 = axe central)"
      - name: is_captain
        description: "Vrai si ce joueur est le capitaine sur cette période"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id
            - formation_seq
            - player_id

  - name: int_shot_placement
    description: >
      Placement de tir au grain « un tir » — base du Post-Shot xG (xGOT).
      Tirs (types 13/14/15/16) issus de int_event_enriched, avec la géométrie du
      placement dans le cadre du but (goal_mouth_y/z) dérivée pour les tirs cadrés :
      zone 3×3, écart au centre, hauteur, distance normalisée à la lucarne. Le xGOT
      entraîné reste en aval ; ce modèle expose les entrées + un xG pré-tir proxy.
      Sources : int_event_enriched, event_values.
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: player_id
        description: "Joueur qui tire"
        tests:
          - not_null
      - name: is_on_target
        description: "Tir cadré (SavedShot ou Goal) — seuls concernés par les dérivés de placement"
      - name: placement_zone
        description: "Zone 3×3 du cadre (rangée_colonne, ex: high_left). NULL si hors cadre / hors champ."
      - name: corner_dist
        description: "Distance normalisée à la lucarne la plus proche (0 = pleine lucarne)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - row_num

  - name: int_whoscored_lineup_agg
    description: >
      Features positionnelles au grain joueur×match, agrégées depuis
      int_whoscored_lineup : position moyenne pondérée par les minutes, slot
      principal, capitaine, nombre de périodes tactiques. Couverture liée à
      formation_slots (se remplit avec le load des archives).
      Source : int_whoscored_lineup.
    columns:
      - name: match_id
        description: "Identifiant unifié du match (SHA1)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: player_id
        description: "Identifiant WhoScored du joueur"
        tests:
          - not_null
      - name: avg_vertical
        description: "Position verticale moyenne (0 = ligne de but propre, ~10 = attaque)"
      - name: avg_horizontal
        description: "Position horizontale moyenne (5 = axe central)"
      - name: primary_slot
        description: "Slot de formation dominant (1..11, 1 = gardien)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id
            - player_id