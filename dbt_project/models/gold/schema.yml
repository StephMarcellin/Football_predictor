version: 2

models:
  - name: features_rolling
    description: >
      Rolling windows W=3/5/10 depuis intermediate.backbone.
      1 ligne par équipe par match — consommée par features_draw et features_whoscored.
    config:
      alias: features_rolling

    columns:
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: team
        description: "Nom de l'équipe"
        tests:
          - not_null
      - name: opponent
        description: "Nom de l'adversaire"
        tests:
          - not_null
      - name: match_id
        description: "ID unique du match provenant du backbone"
      - name: days_since_last_match
        description: "Nombre de jours depuis le dernier match"
      - name: is_short_rest
        description: "Flag (1/0) si le repos est inférieur à 4 jours"
      - name: is_return_from_break
        description: "Flag (1/0) si le dernier match remonte à plus de 20 jours"
      - name: formation
        description: "Système de jeu annoncé (ex: 4-3-3)"
      - name: form_n_defenders
        description: "Nombre de défenseurs extrait de la formation"
      - name: form_familiarity_5
        description: "Stabilité du système sur les 5 derniers matchs (0 à 1)"
      - name: form_change_flag
        description: "1 si l'équipe a changé de système par rapport au match précédent"
      - name: pinnacle_prob_team
        description: "Probabilité implicite de victoire de l'équipe (Pinnacle)"
      - name: market_prob_team
        description: "Probabilité moyenne du marché pour la victoire de l'équipe"
      - name: season_att_rating
        description: "Rating offensif de la saison précédente"
      - name: season_def_rating
        description: "Rating défensif de la saison précédente"
      - name: np_xg_roll_3
        description: "Moyenne npxG sur les 3 derniers matchs"
      - name: np_xg_roll_5
        description: "Moyenne npxG sur les 5 derniers matchs"
      - name: np_xg_roll_10
        description: "Moyenne npxG sur les 10 derniers matchs"
      - name: xg_net_roll_5
        description: "Différentiel xG moyen sur 5 matchs (produit - concédé)"
      - name: shot_quality_ratio_5
        description: "Qualité moyenne des tirs (npxG / shots_total) sur 5 matchs"
      - name: ppda_ratio_roll_5
        description: "Ratio pressing (PPDA / PPDA allowed) sur 5 matchs"
      - name: sterility_index_5
        description: "Indice de possession stérile sur 5 matchs"
      - name: shield_efficiency_5
        description: "Efficacité défensive pondérée par les xG concédés sur 5 matchs"
      - name: win_rate_roll_5
        description: "Taux de victoire sur les 5 derniers matchs"
      - name: points_pg_roll_5
        description: "Points par match sur les 5 derniers matchs"
      - name: draw_rate_5
        description: "Taux de nul sur les 5 derniers matchs"
      - name: home_win_rate_hist
        description: "Taux de victoire à domicile sur toute l'histoire du club"

  - name: features_draw
    description: >
      20 features (F1-F20) de détection de match nul + features comparatives équipe vs adversaire.
      Calculées depuis intermediate.backbone et gold.features_rolling.
      Certaines features WhoScored (F6, F13, F14) sont NULL en attente de migration whoscored.py.

    columns:
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: team
        description: "Nom de l'équipe"
        tests:
          - not_null
      - name: league_source
        description: "Compétition source"
        tests:
          - not_null

      # ── AXE 1 — Détecteurs de match bloqué ──────────────────────────────────
      - name: f1_mutual_cancel_idx
        description: "Index d'annulation mutuelle — stérilité × stérilité adverse / (save_rate + save_rate adverse)"
      - name: f2_defensive_mirror
        description: "Symétrie défensive — 1 - |zone_att_pct - zone_att_pct adverse|"
      - name: f3_draw_market_dev
        description: "Déviation cote nul vs taux de nul historique de la ligue"
      - name: f4_momentum_convergence
        description: "Convergence de momentum — 1 - |ws_momentum_delta - ws_momentum_delta adverse|"

      - name: f5_cs_mutual_rate
        description: "Taux de clean sheet mutuel — cs_rate × cs_rate adverse"
      - name: f6_ht_draw_tendency
        description: "Tendance au nul à la mi-temps (WhoScored) — NULL en attente migration whoscored.py"

      # ── AXE 2 — Domination relative ─────────────────────────────────────────
      - name: f7_off_def_mismatch
        description: "Écart rating offensif équipe vs rating défensif adverse"
      - name: f7_def_off_mismatch
        description: "Écart rating offensif adverse vs rating défensif équipe"
      - name: f8_press_dominance_ratio
        description: "Ratio de domination du pressing (ln(PPDA adverse / PPDA équipe))"
      - name: f9_chance_quality_gap
        description: "Écart de qualité des occasions (sqr équipe - sqr adverse)"
      - name: f10_venue_power_adj
        description: "Ajustement de puissance venue (xg_venue_5 - xg_global_5)"

      # ── AXE 3 — Résilience & psychologie ────────────────────────────────────
      - name: f11_comeback_rate
        description: "Taux de remontée au score sur les 5 derniers matchs"
      - name: f12_red_card_resilience
        description: "Points par match quand l'équipe a reçu un carton rouge"
      - name: f13_late_goal_tendency
        description: "Tendance aux buts tardifs (WhoScored) — NULL en attente migration"
      - name: f14_goal_timing_variance
        description: "Variance du timing des buts (WhoScored) — NULL en attente migration"

      # ── AXE 4 — Efficacité / yield ───────────────────────────────────────────
      - name: f15_xg_yield_ratio
        description: "Ratio buts / xG (surperformance offensive)"
      - name: f16_def_yield_ratio
        description: "Ratio buts concédés / xG concédé (surperformance défensive)"
      - name: f17_shots_to_goal_eff
        description: "Efficacité tirs → buts (gf / shots_total)"
      - name: f18_sot_conversion
        description: "Conversion tirs cadrés → buts (gf / sot)"

      # ── AXE 5 — Composites signatures ───────────────────────────────────────
      - name: f19_tactical_lock_idx
        description: "Index de verrouillage tactique — stérilité mutuelle × équilibre pressing × symétrie zone"
      - name: f20_upset_composite
        description: "Index d'upset — (1/prob_victoire) × surperformance adverse × comeback_rate adverse"

  - name: features_whoscored
    description: >
      Features WhoScored par équipe par match — anti-leakage LAG(1).
      Jointure de intermediate.team_features_ws × intermediate.backbone
      via referentiel.team_mapping. Inclut les squad features rolling 5 matchs.

    columns:
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: team
        description: "Nom normalisé de l'équipe"
        tests:
          - not_null
      - name: league_source
        description: "Compétition source"
        tests:
          - not_null
      - name: has_ws_events
        description: "1 si des données WhoScored sont disponibles pour ce match, 0 sinon"
      - name: ws_field_tilt_actions
        description: "Tilt de terrain — proportion de touches en zone offensive (dernier match connu)"
      - name: ws_momentum_delta
        description: "Delta de momentum après avoir encaissé un but"
      - name: ws_zone_att_pct
        description: "Pourcentage de touches en zone offensive"
      - name: ws_counter_attack_dna
        description: "ADN contre-attaque — proportion de tirs issus d'une récupération rapide"
      - name: ws_midfield_control_idx
        description: "Contrôle du milieu de terrain"
      - name: squad_avg_form_5
        description: "Forme moyenne des joueurs du squad sur les 5 derniers matchs"
      - name: squad_xg_quality_5
        description: "Qualité xG moyenne du squad sur les 5 derniers matchs"
      - name: squad_regularity
        description: "Stabilité du squad — proportion de joueurs présents au match précédent"
      - name: squad_top3_share
        description: "Part des actions portées par les 3 meilleurs joueurs (concentration)"

  - name: features_final
    description: >
      Table finale ML — 1 ligne par équipe par match.
      Jointure de features_rolling × features_whoscored × features_draw.
      Inclut les différentiels équipe vs adversaire, H2H, Giant Killer,
      league_draw_rate et final_match_id.

    columns:
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: team
        description: "Nom normalisé de l'équipe"
        tests:
          - not_null
      - name: opponent
        description: "Nom normalisé de l'adversaire"
        tests:
          - not_null
      - name: league_source
        description: "Compétition source"
        tests:
          - not_null
      - name: match_id
        description: "Identifiant Understat du match"
      - name: ws_match_id
        description: "Identifiant unique canonique — hash md5 sur date|team|opponent|league"
        tests:
          - not_null
      - name: result_1n2
        description: "Résultat du point de vue de l'équipe : H, D, A"
        tests:
          - accepted_values:
              config:
                severity: warn
              arguments:
                values: ['H', 'D', 'A']
      - name: is_home
        description: "1 si l'équipe joue à domicile, 0 sinon"
      - name: xg_net_diff
        description: "Différentiel xg_net W=5 équipe vs adversaire"
      - name: tactical_advantage
        description: "Écart rating offensif équipe vs rating défensif adversaire"
      - name: h2h_win_rate
        description: "Taux de victoire H2H sur les 10 derniers matchs"
      - name: h2h_draw_rate
        description: "Taux de nul H2H sur les 10 derniers matchs"
      - name: h2h_xg_diff
        description: "Différentiel xG moyen en H2H"
      - name: h2h_n_matches
        description: "Nombre de matchs H2H disponibles"
      - name: league_draw_rate
        description: "Taux de nul historique de la ligue (saisons précédentes)"
      - name: rating_ratio_att
        description: "Ratio rating offensif équipe / rating offensif adversaire (Giant Killer)"
      - name: rating_ratio_def
        description: "Ratio rating défensif équipe / rating défensif adversaire"
      - name: upset_risk_index
        description: "Index de surprise — GREATEST(ratio_att, ratio_def) × is_home"
      - name: pinnacle_edge
        description: "Edge Pinnacle — prob_victoire - prob_défaite"
      - name: market_edge
        description: "Edge marché moyen"
      - name: has_ws_events
        description: "1 si données WhoScored disponibles pour ce match"
      - name: squad_avg_form_5
        description: "Forme moyenne du squad sur 5 matchs"
      - name: squad_regularity
        description: "Stabilité du squad"
      - name: f1_mutual_cancel_idx
        description: "Index d'annulation mutuelle (draw signal)"
      - name: f19_tactical_lock_idx
        description: "Index de verrouillage tactique (draw signal composite)"
      - name: f20_upset_composite
        description: "Index d'upset composite (draw signal)"

  - name: features_players
    description: >
      Étape 6.1 — Profil de forme par joueur AVANT chaque match : moyenne des
      métriques sur les 5 apparitions précédentes de la saison (match courant
      exclu, anti-leakage strict). 1 ligne par (match_id, team_id, player_id).
      Peuplé uniquement pour les 4 championnats couverts par WhoScored.
    config:
      alias: features_players
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id
            - player_id
    columns:
      - name: match_id
        description: "ID du match"
        tests:
          - not_null
      - name: team_id
        description: "ID de l'équipe du joueur pour ce match"
        tests:
          - not_null
      - name: player_id
        description: "ID du joueur"
        tests:
          - not_null
      - name: date
        description: "Date du match cible"
        tests:
          - not_null
      - name: season
        description: "Saison — clé de partition de la fenêtre rolling"
      - name: league_source
        description: "Championnat source (WhoScored)"
      - name: avg_xg_chain_5
        description: "xG-chain moyen (somme du crédit des chaînes où le joueur est impliqué), 5 matchs précédents"
      - name: avg_xg_contribution_5
        description: "Proxy xG issu des tirs, moyenne 5 matchs précédents"
      - name: avg_progressive_passes_5
        description: "Passes progressives moyennes, 5 matchs précédents"
      - name: avg_key_passes_5
        description: "Passes clés moyennes, 5 matchs précédents"
      - name: avg_shots_5
        description: "Tirs moyens, 5 matchs précédents"
      - name: avg_pass_share_5
        description: "Part moyenne des passes de l'équipe portées par le joueur, 5 matchs précédents"
      - name: avg_betweenness_5
        description: "Proxy de centralité de passage moyen, 5 matchs précédents"
      - name: avg_creative_rate_5
        description: "Taux moyen de passes créatives, 5 matchs précédents"
      - name: avg_aerial_win_rate_5
        description: "Taux moyen de duels aériens gagnés, 5 matchs précédents"
      - name: avg_tackle_win_rate_5
        description: "Taux moyen de tacles réussis, 5 matchs précédents"
      - name: avg_defensive_actions_5
        description: "Actions défensives moyennes (tacles gagnés + interceptions + dégagements + récupérations), 5 matchs précédents"
      - name: avg_clearances_5
        description: "Dégagements moyens, 5 matchs précédents"
      - name: avg_zone_x_5
        description: "Position longueur moyenne approximée depuis les 25 zones, 5 matchs précédents"
      - name: avg_zone_y_5
        description: "Position largeur moyenne approximée depuis les 25 zones, 5 matchs précédents"
      - name: avg_touches_5
        description: "Touches moyennes, 5 matchs précédents"
      - name: n_matchs_window
        description: "Nombre de matchs réellement utilisés dans la fenêtre (0 à 5) ; 0 = première apparition de la saison, toutes les moyennes sont NULL"

  - name: rolling_corners
    description: >
      Rolling windows W=3/5/10 sur les corners, depuis intermediate.corner_profiles.
      1 ligne par équipe par match — "for" (corners obtenus) et "against" (corners
      concédés), jointes via intermediate.backbone (team_id / opponent_id).
      Action dangereuse = corner ayant produit un tir (outcome IN goal/shot_saved/
      shot_off_target). Ratio de sommes sur la fenêtre, pas moyenne de taux par match.
      Enrichi (Vague 5.4) : intensite de danger continue (xG/corner), profil aerien
      (tetes sur tirs/buts), tendance corner court, et bataille du degagement defensif.
    config:
      alias: rolling_corners

    columns:
      - name: match_id
        description: "ID unique du match provenant du backbone"
        tests:
          - not_null
      - name: team_id
        description: "ID de l'équipe"
        tests:
          - not_null
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: season
        description: "Saison"
      - name: league_source
        description: "Compétition source"
      - name: corners_for_3
        description: "Nombre de corners obtenus sur les 3 derniers matchs"
      - name: corner_danger_rate_for_3
        description: "Taux de corners obtenus ayant produit une action dangereuse, sur 3 matchs"
      - name: corner_conversion_rate_for_3
        description: "Taux de conversion en but des actions dangereuses issues de corner, sur 3 matchs"
      - name: corners_against_3
        description: "Nombre de corners concédés sur les 3 derniers matchs"
      - name: corner_danger_rate_against_3
        description: "Taux de corners concédés ayant produit une action dangereuse, sur 3 matchs"
      - name: corner_conversion_rate_against_3
        description: "Taux de conversion en but des corners concédés, sur 3 matchs"
      - name: corner_danger_intensity_for_3
        description: "Danger continu généré par corner obtenu (somme chain_danger_total / nb corners), sur 3 matchs — équivalent xG par corner"
      - name: corner_danger_intensity_against_3
        description: "Danger continu concédé par corner concédé, sur 3 matchs"
      - name: corner_header_share_for_3
        description: "Part des tirs issus de corners obtenus qui sont des têtes, sur 3 matchs"
      - name: corner_header_share_against_3
        description: "Part des tirs issus de corners concédés qui sont des têtes, sur 3 matchs"
      - name: corner_header_goal_share_for_3
        description: "Part des buts sur corner obtenu marqués de la tête, sur 3 matchs"
      - name: corner_header_goal_share_against_3
        description: "Part des buts sur corner concédé marqués de la tête, sur 3 matchs"
      - name: corner_short_rate_for_3
        description: "Part des corners obtenus joués courts plutôt que centrés, sur 3 matchs"
      - name: corner_short_rate_against_3
        description: "Part des corners concédés joués courts par l'adversaire, sur 3 matchs"
      - name: corner_forced_bad_clearance_rate_for_3
        description: "Part des dégagements adverses mal exécutés (poor/failed) face à nos corners, sur 3 matchs — capacité à créer du chaos en seconde balle"
      - name: corner_clearance_fail_rate_against_3
        description: "Part de nos propres dégagements mal exécutés (poor/failed) face aux corners concédés, sur 3 matchs — solidité défensive"
      - name: corner_headed_clearance_rate_against_3
        description: "Part de nos dégagements défensifs faits de la tête, sur 3 matchs"
      - name: corners_for_5
        description: "Nombre de corners obtenus sur les 5 derniers matchs"
      - name: corner_danger_rate_for_5
        description: "Taux de corners obtenus ayant produit une action dangereuse, sur 5 matchs"
      - name: corner_conversion_rate_for_5
        description: "Taux de conversion en but des actions dangereuses issues de corner, sur 5 matchs"
      - name: corners_against_5
        description: "Nombre de corners concédés sur les 5 derniers matchs"
      - name: corner_danger_rate_against_5
        description: "Taux de corners concédés ayant produit une action dangereuse, sur 5 matchs"
      - name: corner_conversion_rate_against_5
        description: "Taux de conversion en but des corners concédés, sur 5 matchs"
      - name: corner_danger_intensity_for_5
        description: "Danger continu généré par corner obtenu, sur 5 matchs — équivalent xG par corner"
      - name: corner_danger_intensity_against_5
        description: "Danger continu concédé par corner concédé, sur 5 matchs"
      - name: corner_header_share_for_5
        description: "Part des tirs issus de corners obtenus qui sont des têtes, sur 5 matchs"
      - name: corner_header_share_against_5
        description: "Part des tirs issus de corners concédés qui sont des têtes, sur 5 matchs"
      - name: corner_header_goal_share_for_5
        description: "Part des buts sur corner obtenu marqués de la tête, sur 5 matchs"
      - name: corner_header_goal_share_against_5
        description: "Part des buts sur corner concédé marqués de la tête, sur 5 matchs"
      - name: corner_short_rate_for_5
        description: "Part des corners obtenus joués courts plutôt que centrés, sur 5 matchs"
      - name: corner_short_rate_against_5
        description: "Part des corners concédés joués courts par l'adversaire, sur 5 matchs"
      - name: corner_forced_bad_clearance_rate_for_5
        description: "Part des dégagements adverses mal exécutés face à nos corners, sur 5 matchs"
      - name: corner_clearance_fail_rate_against_5
        description: "Part de nos propres dégagements mal exécutés face aux corners concédés, sur 5 matchs"
      - name: corner_headed_clearance_rate_against_5
        description: "Part de nos dégagements défensifs faits de la tête, sur 5 matchs"
      - name: corners_for_10
        description: "Nombre de corners obtenus sur les 10 derniers matchs"
      - name: corner_danger_rate_for_10
        description: "Taux de corners obtenus ayant produit une action dangereuse, sur 10 matchs"
      - name: corner_conversion_rate_for_10
        description: "Taux de conversion en but des actions dangereuses issues de corner, sur 10 matchs"
      - name: corners_against_10
        description: "Nombre de corners concédés sur les 10 derniers matchs"
      - name: corner_danger_rate_against_10
        description: "Taux de corners concédés ayant produit une action dangereuse, sur 10 matchs"
      - name: corner_conversion_rate_against_10
        description: "Taux de conversion en but des corners concédés, sur 10 matchs"
      - name: corner_danger_intensity_for_10
        description: "Danger continu généré par corner obtenu, sur 10 matchs — équivalent xG par corner"
      - name: corner_danger_intensity_against_10
        description: "Danger continu concédé par corner concédé, sur 10 matchs"
      - name: corner_header_share_for_10
        description: "Part des tirs issus de corners obtenus qui sont des têtes, sur 10 matchs"
      - name: corner_header_share_against_10
        description: "Part des tirs issus de corners concédés qui sont des têtes, sur 10 matchs"
      - name: corner_header_goal_share_for_10
        description: "Part des buts sur corner obtenu marqués de la tête, sur 10 matchs"
      - name: corner_header_goal_share_against_10
        description: "Part des buts sur corner concédé marqués de la tête, sur 10 matchs"
      - name: corner_short_rate_for_10
        description: "Part des corners obtenus joués courts plutôt que centrés, sur 10 matchs"
      - name: corner_short_rate_against_10
        description: "Part des corners concédés joués courts par l'adversaire, sur 10 matchs"
      - name: corner_forced_bad_clearance_rate_for_10
        description: "Part des dégagements adverses mal exécutés face à nos corners, sur 10 matchs"
      - name: corner_clearance_fail_rate_against_10
        description: "Part de nos propres dégagements mal exécutés face aux corners concédés, sur 10 matchs"
      - name: corner_headed_clearance_rate_against_10
        description: "Part de nos dégagements défensifs faits de la tête, sur 10 matchs"

  - name: rolling_freekicks
    description: >
      Rolling windows W=3/5/10 sur les coups francs, depuis intermediate.freekick_profiles.
      1 ligne par équipe par match — "for" (coups francs obtenus) et "against" (concédés),
      jointes via intermediate.backbone (team_id / opponent_id). Filtré sur
      fk_zone_type IN (crossed, direct_shot) : les coups francs too_far/own_box sont
      exclus, ils n'ont pas de danger réel et diluent le signal.
      Action dangereuse = coup franc ayant produit un tir. Ratio de sommes sur la
      fenêtre, pas moyenne de taux par match.
      Enrichi (Vague 5.4) : intensité de danger continue, profil aérien, bataille du
      dégagement, répartition tactique par zone (direct/crossed/own_box/too_far,
      non filtrée) et qualité de position (distance/angle) des coups francs directs.
    config:
      alias: rolling_freekicks

    columns:
      - name: match_id
        description: "ID unique du match provenant du backbone"
        tests:
          - not_null
      - name: team_id
        description: "ID de l'équipe"
        tests:
          - not_null
      - name: date
        description: "Date du match"
        tests:
          - not_null
      - name: season
        description: "Saison"
      - name: league_source
        description: "Compétition source"
      - name: freekicks_for_3
        description: "Nombre de coups francs crossés/directs obtenus sur les 3 derniers matchs"
      - name: freekick_danger_rate_for_3
        description: "Taux de coups francs obtenus ayant produit une action dangereuse, sur 3 matchs"
      - name: freekick_conversion_rate_for_3
        description: "Taux de conversion en but des actions dangereuses issues de coup franc, sur 3 matchs"
      - name: freekicks_against_3
        description: "Nombre de coups francs crossés/directs concédés sur les 3 derniers matchs"
      - name: freekick_danger_rate_against_3
        description: "Taux de coups francs concédés ayant produit une action dangereuse, sur 3 matchs"
      - name: freekick_conversion_rate_against_3
        description: "Taux de conversion en but des coups francs concédés, sur 3 matchs"
      - name: freekick_danger_intensity_for_3
        description: "Danger continu généré par coup franc obtenu (somme chain_danger_total / nb coups francs), sur 3 matchs"
      - name: freekick_danger_intensity_against_3
